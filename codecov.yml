# Codecov configuration
# Docs: https://docs.codecov.com/docs/codecovyml-reference

coverage:
  status:
    # Project-wide coverage (total codebase)
    project:
      default:
        target: auto        # Maintain current coverage level
        threshold: 5%       # Allow 5% drop before failing
        if_ci_failed: ignore
        informational: true # Non-blocking: display only
        paths:
          - 'src/**/*.ts'
          - 'src/**/*.tsx'
          - 'src/**/*.astro'

    # Patch coverage (lines changed in the PR)
    patch:
      default:
        target: 50%         # At least 50% of new lines covered
        threshold: 10%      # Allow 10% deviation
        if_ci_failed: ignore
        informational: true # Non-blocking: display only
        paths:
          - 'src/**/*.ts'
          - 'src/**/*.tsx'
          - 'src/**/*.astro'

  # Exclude files that don't need coverage measurement
  ignore:
    - 'tests/**/*'
    - '.config/**/*'
    - 'scripts/**/*'
    - '**/*.config.*'
    - '**/*.d.ts'
    - 'src/env.d.ts'
    - 'src/types/**/*'
    - '**/node_modules/**/*'

# PR comment behavior
comment:
  layout: 'reach, diff, flags, files'
  behavior: default
  require_changes: true     # Only post comment if coverage changes
  require_base: true        # Require base coverage report for comparison
  require_head: true        # Require head coverage report

# General settings
github_checks:
  annotations: true         # Show coverage annotations in PR diff
