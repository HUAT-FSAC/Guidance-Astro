name: Collect Project Metrics

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

jobs:
  collect:
    name: Collect and Persist Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      issues: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect metrics snapshot
        run: node scripts/metrics/collect-github-metrics.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Create Pull Request for updated metrics
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(metrics): update project progress snapshot"
          title: "chore(metrics): update project progress snapshot"
          body: "Automated update of project progress metrics. Please review and merge to update the dashboard."
          branch: "chore/update-metrics"
          base: "main"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          add-paths: |
            src/data/metrics/project-progress.json
