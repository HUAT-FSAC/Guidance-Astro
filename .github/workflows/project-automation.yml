name: Project Automation

on:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  pull_request:
    types: [opened, edited, closed, reopened, labeled, unlabeled, synchronize]
  issue_comment:
    types: [created, edited]

jobs:
  # 新 Issue 自动进入 Projects 看板
  add-to-project:
    name: Add to Project
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    steps:
      - name: Add to GitHub Project
        uses: actions/add-to-project@v1
        with:
          project-url: https://github.com/orgs/HUAT-FSAC/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}

  # 自动更新 Issue 状态标签
  update-issue-status:
    name: Update Issue Status
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update status based on labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            
            // 根据标签确定状态
            let status = 'status:backlog';
            if (labels.includes('status:in-progress')) status = 'status:in-progress';
            if (labels.includes('status:review')) status = 'status:review';
            if (labels.includes('status:blocked')) status = 'status:blocked';
            if (issue.state === 'closed') status = 'status:done';
            
            console.log(`Issue #${issue.number} status: ${status}`);

  # PR 合并后自动更新关联 Issue 状态
  update-linked-issues:
    name: Update Linked Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    steps:
      - name: Find and close linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            
            // 提取 Closes/Fixes/Resolves 关键字后的 issue 编号
            const closesRegex = /(?:closes|fixes|resolves)\s+#(\d+)/gi;
            const matches = [...body.matchAll(closesRegex)];
            
            for (const match of matches) {
              const issueNumber = parseInt(match[1]);
              
              // 添加评论
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `✅ 已在 PR #${pr.number} 中完成并合并到主分支。`
              });
              
              // 关闭 Issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed',
                labels: ['status:done']
              });
              
              console.log(`Closed issue #${issueNumber}`);
            }

  # 检查里程碑延期
  check-milestone-deadline:
    name: Check Milestone Deadline
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * *'  # 每天上午9点运行
    steps:
      - name: Check milestones
        uses: actions/github-script@v7
        with:
          script: |
            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            
            const now = new Date();
            const warningDays = 3;
            
            for (const milestone of milestones.data) {
              if (!milestone.due_on) continue;
              
              const dueDate = new Date(milestone.due_on);
              const daysUntilDue = Math.ceil((dueDate - now) / (1000 * 60 * 60 * 24));
              
              if (daysUntilDue <= warningDays && daysUntilDue >= 0) {
                // 创建警告评论
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: 1,  // 或者创建一个新 issue
                  body: `⚠️ 里程碑 "${milestone.title}" 将在 ${daysUntilDue} 天后到期 (${milestone.due_on})`
                });
              }
            }
